# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "2.6"
metadata:
  name: zca_company_management
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://sapdev.grupornm.pt:44300/
          client: "200"
        app:
          name: ZCA_COMPANY
          description: COMPANY Management
          package: ZCA01
          transport: DD2K907321
        exclude:
          - /test/